                        <>
                            <ClientApp addToCart={addToCart} cart={cart} setIsCartOpen={setIsCartOpen} />
                            <CartDrawer isOpen={isCartOpen} onClose={() => setIsCartOpen(false)} cart={cart} setCart={setCart} />
                        </>
                    )}
                    {currentRole === 'admin' && <AdminPanel />}
                    {currentRole === 'kitchen' && <KitchenDisplay />}
                    {currentRole === 'courier' && <CourierApp />}
                </div>
            );
        };

        // === РЕНДЕР ===
        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
